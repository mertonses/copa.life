apply plugin: 'com.android.application'

import groovy.json.JsonSlurper

def versionFile = file('../../release/android-version.json')
if (!versionFile.exists()) {
    throw new GradleException("Missing release/android-version.json")
}
def releaseVersion = new JsonSlurper().parse(versionFile)
def configuredVersionCode = releaseVersion.versionCode.toString().toInteger()
def configuredVersionName = releaseVersion.versionName.toString()
if (configuredVersionCode < 1 || !(configuredVersionName ==~ /\d+\.\d+\.\d+/)) {
    throw new GradleException("Invalid Android version: ${configuredVersionName} (${configuredVersionCode})")
}

def releaseStoreFile = System.getenv('ANDROID_KEYSTORE_PATH')
def releaseStorePassword = System.getenv('ANDROID_KEYSTORE_PASSWORD')
def releaseKeyAlias = System.getenv('ANDROID_KEY_ALIAS')
def releaseKeyPassword = System.getenv('ANDROID_KEY_PASSWORD')
def releaseSigningValues = [
    releaseStoreFile,
    releaseStorePassword,
    releaseKeyAlias,
    releaseKeyPassword,
]
def releaseSigningConfigured = releaseSigningValues.every { it != null && !it.trim().isEmpty() }
if (releaseSigningValues.any { it != null && !it.trim().isEmpty() } && !releaseSigningConfigured) {
    throw new GradleException("Android release signing requires all four ANDROID_KEY_* / keystore variables")
}

def admobTestAppId = 'ca-app-pub-3940256099942544~3347511713'
def admobTestInterstitialId = 'ca-app-pub-3940256099942544/1033173712'
def configuredAdmobAppId = (project.findProperty('COPA_ADMOB_APP_ID') ?: System.getenv('COPA_ADMOB_APP_ID') ?: admobTestAppId).toString().trim()
def configuredAdmobInterstitialId = (project.findProperty('COPA_ADMOB_INTERSTITIAL_ID') ?: System.getenv('COPA_ADMOB_INTERSTITIAL_ID') ?: admobTestInterstitialId).toString().trim()
def admobTestMode = configuredAdmobAppId == admobTestAppId || configuredAdmobInterstitialId == admobTestInterstitialId
def asBuildConfigString = { value -> '"' + value.replace('\\', '\\\\').replace('"', '\\"') + '"' }

android {
    namespace = "life.copa.app"
    compileSdk = rootProject.ext.compileSdkVersion
    signingConfigs {
        release {
            if (releaseSigningConfigured) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    defaultConfig {
        applicationId "life.copa.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode configuredVersionCode
        versionName configuredVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        manifestPlaceholders = [admobAppId: configuredAdmobAppId]
        buildConfigField "String", "COPA_ADMOB_APP_ID", asBuildConfigString(configuredAdmobAppId)
        buildConfigField "String", "COPA_ADMOB_INTERSTITIAL_ID", asBuildConfigString(configuredAdmobInterstitialId)
        buildConfigField "boolean", "COPA_ADMOB_TEST_MODE", admobTestMode.toString()
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (releaseSigningConfigured) {
                signingConfig signingConfigs.release
            }
        }
    }
    buildFeatures {
        buildConfig = true
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation 'com.google.android.libraries.ads.mobile.sdk:ads-mobile-sdk:1.2.1'
    implementation 'com.google.android.ump:user-messaging-platform:4.0.0'
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
