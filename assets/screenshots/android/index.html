<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>copa.life · Android oyun görüntüleri</title>
  <style>
    :root{color-scheme:light;--ink:#0c1213;--slate:#496e71;--paper:#f3f0e8;--line:#c8d2d0;--accent:#429a73}
    *{box-sizing:border-box}
    body{margin:0;background:var(--paper);color:var(--ink);font:16px/1.5 system-ui,sans-serif}
    main{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:40px 0 64px}
    header{margin-bottom:28px}
    h1{margin:0;font-size:clamp(28px,5vw,48px);letter-spacing:-.04em}
    p{max-width:760px;color:var(--slate)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,260px),1fr));gap:20px;align-items:start}
    figure{margin:0;overflow:hidden;border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:0 12px 34px rgba(12,18,19,.09)}
    img{display:block;width:100%;height:auto;background:#e7eceb}
    figcaption{padding:12px 14px;border-top:1px solid var(--line);font-weight:700}
    a{color:var(--accent)}
  </style>
</head>
<body>
<main>
  <header>
    <h1>Android oyun görüntüleri</h1>
    <p>Android 14 emülatöründe imzalı release adayından alınmış gerçek oyun ekranları. Armalar mobil sürüme özel jenerik görsel sistemini kullanır.</p>
    <p><a href="/">copa.life’a dön</a></p>
  </header>
  <section class="grid" aria-label="Android ekran görüntüleri">
    <figure>
      <a href="draft-philosophy.png"><img src="draft-philosophy.png" alt="Oyun felsefesi seçim ekranı" loading="eager"></a>
      <figcaption>Felsefe ve oyun planı seçimi</figcaption>
    </figure>
    <figure>
      <a href="squad-hub.png"><img src="squad-hub.png" alt="Takım merkezi ve saha dizilişi ekranı" loading="lazy"></a>
      <figcaption>Takım merkezi ve ilk 11</figcaption>
    </figure>
    <figure>
      <a href="player-profile.png"><img src="player-profile.png" alt="Altı COPA boyutuyla oyuncu profili" loading="lazy"></a>
      <figcaption>Oyuncu profili · COPA puanları</figcaption>
    </figure>
    <figure>
      <a href="player-profile-details.png"><img src="player-profile-details.png" alt="Oyuncu profilinin güçlü yönler ve riskler bölümü" loading="lazy"></a>
      <figcaption>Oyuncu profili · güçlü yönler ve riskler</figcaption>
    </figure>
    <figure>
      <a href="final-simulation.png"><img src="final-simulation.png" alt="Android final maç simülasyonu ve maç olayları" loading="lazy"></a>
      <figcaption>Final maç simülasyonu</figcaption>
    </figure>
  </section>
</main>
</body>
</html>
