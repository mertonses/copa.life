<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Copa.life — Card Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;border-radius:0!important;}
:root{
  --paper:#f5f0e8;--paper2:#ede8df;--ink:#1a1a14;--ink2:#6b6657;
  --line:#c8c2b4;--mono:"Courier New",monospace;--mustard:#c8960c;
  --golden:#b8860b;--golden-bg:#fdf8ee;--dark:#3a2a6a;--dark-bg:#eeeaf6;
}
body{background:var(--paper);color:var(--ink);font-family:var(--mono);font-size:11px;padding:12px;}
h1{font-size:13px;letter-spacing:.12em;border-bottom:2px solid var(--ink);padding-bottom:5px;margin-bottom:4px;}
.note{font-size:9px;color:var(--ink2);margin-bottom:10px;padding:4px 0;}
.note b{color:var(--golden);}
.note span{color:var(--dark);}
.toolbar{display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.toolbar button{background:var(--ink);color:var(--paper);border:none;padding:4px 10px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;cursor:pointer;}
.toolbar button:hover{background:var(--mustard);}
.toolbar .status{color:var(--ink2);font-size:10px;}

.card-pair{display:grid;grid-template-columns:200px 1fr 1fr;gap:0;border:1px solid var(--line);margin-bottom:6px;}
.card-base{padding:6px 8px;border-right:1px solid var(--line);background:var(--paper2);}
.card-variant{padding:6px 8px;}
.card-variant.golden{background:var(--golden-bg);border-right:1px solid var(--line);}
.card-variant.dark{background:var(--dark-bg);}
.vtitle{font-size:9px;letter-spacing:.1em;font-weight:bold;margin-bottom:5px;}
.vtitle.golden{color:var(--golden);}
.vtitle.dark{color:var(--dark);}
.row{display:flex;gap:4px;align-items:center;margin-bottom:3px;}
.lbl{font-size:9px;color:var(--ink2);min-width:38px;flex-shrink:0;}
input[type=text],input[type=number],select,textarea{
  background:var(--paper);border:1px solid var(--line);color:var(--ink);
  font-family:var(--mono);font-size:10px;padding:1px 4px;
}
input[type=text],select{width:100%;}
input[type=number]{width:44px;}
textarea{width:100%;resize:vertical;min-height:32px;font-size:9px;line-height:1.3;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ink);}
.card-icon{font-size:18px;display:block;margin-bottom:3px;}
.card-key{font-size:9px;color:var(--ink2);margin-bottom:5px;letter-spacing:.04em;}
.kara-zero{opacity:0.5;}
.output-area{margin-top:14px;border:1px solid var(--line);padding:8px;}
.output-area h2{font-size:10px;letter-spacing:.1em;margin-bottom:6px;}
.output-area textarea{width:100%;height:200px;background:var(--ink);color:#c8ffb0;font-size:9px;border:none;padding:6px;}
</style>
</head>
<body>

<div class="note">
  <b>GOLDEN</b>: scaling kartlarda +1 güç global · <span>DARK</span>: +3 güç global, finalde KARA CEZA düşer (kart başına farklı, 0=yok)
</div>
<div class="toolbar">
  <button onclick="exportJSON()">EXPORT JSON</button>
  <button onclick="copyJSON()">COPY</button>
  <button onclick="resetAll()">RESET</button>
  <span class="status" id="status"></span>
</div>
<div id="cards-grid"></div>
<div class="output-area">
  <h2>JSON OUTPUT</h2>
  <textarea id="json-output" readonly></textarea>
</div>

let data = JSON.parse(JSON.stringify(CARDS));

function sel(id, options, val){
  return '<select id="'+id+'">'+options.map(function(o){
    return '<option value="'+o+'"'+(o===val?' selected':'')+'>'+o+'</option>';
  }).join('')+'</select>';
}

function renderCards(){
  var grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  data.forEach(function(c){
    var div = document.createElement('div');
    div.className = 'card-pair';
    div.innerHTML =
      '<div class="card-base">'+
        '<span class="card-icon">'+c.icon+'</span>'+
        '<div class="card-key">'+c.key+'</div>'+
        '<div class="row"><span class="lbl">TR</span><input type="text" id="'+c.key+'_tr_n" value="'+esc(c.tr_n)+'"></div>'+
        '<div class="row"><span class="lbl">EN</span><input type="text" id="'+c.key+'_en_n" value="'+esc(c.en_n)+'"></div>'+
        '<div class="row"><span class="lbl">fiyat</span><input type="number" id="'+c.key+'_price" value="'+c.price+'"> €M</div>'+
        '<div class="row"><span class="lbl">tür</span>'+sel(c.key+'_kind',['power','defense','squad','final','economy','risk','temporary'],c.kind)+'</div>'+
        '<div class="row"><span class="lbl">mod</span>'+sel(c.key+'_mode',['scaling','instant','contract'],c.mode)+'</div>'+
      '</div>'+
      '<div class="card-variant golden">'+
        '<div class="vtitle golden">⬤ GOLDEN</div>'+
        '<textarea id="'+c.key+'_golden_desc" rows="4">'+esc(c.golden_desc)+'</textarea>'+
      '</div>'+
      '<div class="card-variant dark">'+
        '<div class="vtitle dark">⬤ DARK</div>'+
        '<textarea id="'+c.key+'_dark_desc" rows="3">'+esc(c.dark_desc)+'</textarea>'+
        '<div class="row" style="margin-top:4px"><span class="lbl">final -</span><input type="number" id="'+c.key+'_kara_pen" value="'+c.kara_pen+'" class="'+(c.kara_pen===0?'kara-zero':'')+'"></div>'+
      '</div>';
    grid.appendChild(div);
    var fields = ['tr_n','en_n','price','kind','mode','golden_desc','dark_desc','kara_pen'];
    fields.forEach(function(f){
      var el = document.getElementById(c.key+'_'+f);
      if(!el) return;
      el.addEventListener('input', function(){ sync(c.key, f, el.value); });
      el.addEventListener('change', function(){ sync(c.key, f, el.value); });
    });
  });
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function sync(key, f, value){
  var idx = data.findIndex(function(c){ return c.key===key; });
  if(idx<0) return;
  if(f==='price'||f==='kara_pen') data[idx][f]=parseInt(value)||0;
  else data[idx][f]=value;
  if(f==='kara_pen'){
    var el = document.getElementById(key+'_kara_pen');
    if(el) el.className = data[idx].kara_pen===0?'kara-zero':'';
  }
}

function exportJSON(){
  var json = JSON.stringify(data, null, 2);
  document.getElementById('json-output').value = json;
  document.getElementById('status').textContent = data.length+' kart';
}

function copyJSON(){
  exportJSON();
  var ta = document.getElementById('json-output');
  ta.select();
  navigator.clipboard.writeText(ta.value).then(function(){
    document.getElementById('status').textContent = 'Kopyalandı!';
  }).catch(function(){
    document.execCommand('copy');
    document.getElementById('status').textContent = 'Kopyalandı!';
  });
}

function resetAll(){
  if(!confirm('Sıfırla?')) return;
  data = JSON.parse(JSON.stringify(CARDS));
  renderCards();
  document.getElementById('status').textContent = 'Sıfırlandı.';
}

renderCards();
