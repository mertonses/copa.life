name: Android candidate

on:
  schedule:
    - cron: '17 5 1 * *'
  pull_request:
    paths:
      - 'android/**'
      - 'assets/**'
      - 'capacitor.config.json'
      - 'index.html'
      - 'manifest.json'
      - 'package.json'
      - 'package-lock.json'
      - 'privacy.html'
      - 'release/**'
      - 'site.webmanifest'
      - 'src/**'
      - 'store/android/whatsnew/**'
      - 'store/android/release-notes.json'
      - 'sw.js'
      - 'takedown.html'
      - 'terms.html'
      - 'tools/**'
      - '.java-version'
      - '.nvmrc'
      - '.github/workflows/android-candidate.yml'
      - '.github/workflows/android-play.yml'
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'assets/**'
      - 'capacitor.config.json'
      - 'index.html'
      - 'manifest.json'
      - 'package.json'
      - 'package-lock.json'
      - 'privacy.html'
      - 'release/**'
      - 'site.webmanifest'
      - 'src/**'
      - 'store/android/whatsnew/**'
      - 'store/android/release-notes.json'
      - 'sw.js'
      - 'takedown.html'
      - 'terms.html'
      - 'tools/**'
      - '.java-version'
      - '.nvmrc'
      - '.github/workflows/android-candidate.yml'
      - '.github/workflows/android-play.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-candidate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install application dependencies
        run: npm ci

      - name: Install Ghost API dependencies
        run: npm ci --prefix services/ghost-club-api

      - name: Install browser test dependencies
        run: npm ci --prefix playtest/runner

      - name: Install Chromium
        run: npx --prefix playtest/runner playwright install --with-deps chromium

      - name: Verify release configuration and dependency security
        run: |
          npm run check:android:release
          npm run audit:security

      - name: Validate shared game and services
        run: |
          npm test
          npm run check --prefix services/ghost-club-api
          npm run test:ci --prefix playtest/runner

      - name: Verify web and Android parity
        run: npm run check:parity

      - name: Sync native Android project
        run: npm run android:sync

      - name: Build unsigned release candidate
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease --no-daemon

      - name: Inspect AAB payload and write candidate manifest
        run: |
          npm run check:android:aab
          node tools/write-android-candidate-manifest.mjs android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload unsigned candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unsigned-android-candidate-${{ github.sha }}
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/bundle/release/candidate-manifest.json
          if-no-files-found: error
          retention-days: 14
