name: Legal Pages

on:
  pull_request:
    paths:
      - 'privacy.html'
      - 'terms.html'
      - 'takedown.html'
      - 'tools/build-legal-pages.mjs'
      - 'tools/check-legal-pages.mjs'
      - 'docs/android-store-readiness.md'
      - 'store/android/play-console-declarations.md'
      - '.github/workflows/legal-pages.yml'
  push:
    branches: [main]
    paths:
      - 'privacy.html'
      - 'terms.html'
      - 'takedown.html'
      - 'tools/build-legal-pages.mjs'
      - 'tools/check-legal-pages.mjs'
      - 'docs/android-store-readiness.md'
      - 'store/android/play-console-declarations.md'
      - '.github/workflows/legal-pages.yml'
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: legal-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm run check:legal
      - name: Check stable live URLs
        if: github.event_name == 'schedule'
        run: node tools/check-legal-pages.mjs --remote
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: legal-pages-${{ github.sha }}
          path: dist-legal
          if-no-files-found: error
          retention-days: 7

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: legal-pages
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/ghost-club-api/package-lock.json
      - run: npm ci --prefix services/ghost-club-api
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: legal-pages-${{ github.sha }}
          path: dist-legal
      - name: Deploy stable legal site
        run: npx --prefix services/ghost-club-api wrangler pages deploy dist-legal --project-name copa-life-legal --branch main --commit-hash "$GITHUB_SHA" --commit-message "Legal pages ${GITHUB_SHA::12}"
      - name: Verify production URLs
        run: node tools/check-legal-pages.mjs --remote
