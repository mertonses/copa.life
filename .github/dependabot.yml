version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /services/ghost-club-api
    schedule:
      interval: weekly
      day: monday
      time: '06:15'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 3
    groups:
      ghost-api-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /playtest/runner
    schedule:
      interval: weekly
      day: monday
      time: '06:30'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 3
    groups:
      playtest-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
      day: tuesday
      time: '06:00'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: '06:15'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 3
